services:
  web:
    image: nginx:alpine
    cpus: 0.25
    mem_limit: 64m
    volumes:
      - ./.stack-data/site:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 15s
      timeout: 3s
      retries: 6
      start_period: 5s
